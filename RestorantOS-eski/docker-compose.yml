services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: restaurantos-sqlserver
    ports:
      - "0.0.0.0:14330:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "RestaurantOS@2024!"
      MSSQL_PID: "Developer"
    volumes:
      - restaurantos_sql_data:/var/opt/mssql
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'RestaurantOS@2024!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: always

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: restaurantos-app
    ports:
      - "0.0.0.0:8080:80"
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:8081"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=RestaurantOS;User Id=sa;Password=RestaurantOS@2024!;TrustServerCertificate=True;Encrypt=False;"
      Jwt__Key: "RestaurantOS-JWT-Secret-Key-2024-Min32Chars!"
      Jwt__Issuer: "RestaurantOS"
      Jwt__Audience: "RestaurantOS.Web"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - default
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  restaurantos_sql_data:

networks:
  default:
    name: restorantos_default
